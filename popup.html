<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Translate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #4A90E2; }
    .row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    #saveBtn {
      background: #4A90E2;
      color: #fff;
      font-weight: 600;
    }
    #saveBtn:hover { background: #357abd; }
    #saveBtn:disabled { background: #a0c4f1; cursor: not-allowed; }
    #clearBtn {
      background: #f5f5f5;
      color: #666;
    }
    #clearBtn:hover { background: #e9e9e9; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 18px;
    }
    .status.ok { color: #27ae60; }
    .status.err { color: #c0392b; }
    .status.checking { color: #999; }
    hr { border: none; border-top: 1px solid #eee; margin: 14px 0; }
    .tips { font-size: 12px; color: #888; line-height: 1.6; }
    .tips strong { color: #555; }
    a { color: #4A90E2; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>🌐 Mini Translate</h1>

  <label for="apiKey">Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />

  <div class="row">
    <button id="saveBtn">保存并验证</button>
    <button id="clearBtn">清除</button>
  </div>
  <div class="status" id="status"></div>

  <hr />
  <div class="tips">
    <strong>使用方法</strong><br />
    划词 → 点击「译」按钮：词句翻译<br />
    按住 <kbd>⌘ Command</kbd> + 点击段落：沉浸翻译<br />
    <br />
    还没有 API Key？
    <a href="https://aistudio.google.com/apikey" target="_blank">
      Google AI Studio 免费申请 →
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
